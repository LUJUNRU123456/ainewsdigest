# ============================================================
#  评分配置文件 — 控制新闻"重不重要"的判断标准
# ============================================================
#  改法说明：
#    - 改数字就行，别改字段名（冒号左边的）
#    - 权重加起来要等于 1.0，不然评分会偏
#    - 想加维度：复制一整段 dim_X，改名字和权重
#    - 想删维度：整段删掉，然后调其他权重让总和 = 1.0
# ============================================================

# --- 评分阈值 -------------------------------------------------
#  这条新闻总分到多少分，做什么处理
thresholds:

  deep_analysis: 7.5
  # ≥ 这个分数 → 写深度分析（200-300字 + 历史类似事件对照）
  # 建议范围：6.5 ~ 8.0，设太高会没几条深度分析

  brief: 4.0
  # ≥ 这个分数且 < deep_analysis → 写简短摘要（80-100字）
  # 建议范围：3.0 ~ 5.0

  # < 4.0 的新闻直接丢弃，不进入邮件

# --- 评分维度 -------------------------------------------------
#  每条新闻从下面几个角度打分，1-10 分
#  最终得分 = 各维度得分 × 权重 的总和
scoring_dimensions:

  # ======== 维度 1 ========
  - name: "资金信号强度"
    weight: 0.35
    # 改这个数字 = 调这个维度的占比。所有 weight 相加必须 = 1.0
    description: "有没有融资金额、并购条款、订单数据、CAPEX 指引等可量化的资金信息"
    rubric:
      9-10: "有明确金额且规模 ≥1亿美元，或改变行业格局的交易"
      7-8: "有金额但规模中等，或间接涉及的资金流向"
      5-6: "提到资金相关内容但没有具体数字"
      1-4: "完全没有资金相关内容"

  # ======== 维度 2 ========
  - name: "产业链影响半径"
    weight: 0.25
    # 改这个数字 = 调这个维度的占比
    description: "这条消息影响几个产业环节，是否会引发连锁反应"
    rubric:
      9-10: "横跨 4 个以上环节（如：芯片 → 服务器 → 云厂商 → AI应用）"
      7-8: "影响 2-3 个环节"
      5-6: "只影响单一环节内的多家公司"
      1-4: "仅影响一家公司自身"

  # ======== 维度 3 ========
  - name: "政策监管冲击"
    weight: 0.20
    # 改这个数字 = 调这个维度的占比
    description: "是否涉及出口管制、补贴政策、安全审查、数据合规等监管变化"
    rubric:
      9-10: "国家级政策出台或修订，直接改变行业游戏规则"
      7-8: "监管机构重大行动，或关键法案实质性推进"
      5-6: "政策讨论/征求意见阶段，尚未落地"
      1-4: "不涉及政策监管内容"

  # ======== 维度 4 ========
  - name: "时效与稀缺性"
    weight: 0.12
    # 改这个数字 = 调这个维度的占比
    description: "是突发/独家消息，还是通稿/周报/旧闻"
    rubric:
      9-10: "突发新闻或独家调查，今天首次披露"
      7-8: "24 小时内的新消息，有实质性信息增量"
      5-6: "持续报道的后续跟进"
      1-4: "综述/回顾/通稿/超过 2 天的旧闻"

  # ======== 维度 5 ========
  - name: "来源权威度"
    weight: 0.08
    # 改这个数字 = 调这个维度的占比
    description: "信息来源有多可靠"
    rubric:
      9-10: "Bloomberg / Reuters / 财新 / 公司官方公告"
      7-8: "知名科技媒体 / 券商研报"
      5-6: "行业自媒体 / 个人博客"
      1-4: "匿名来源 / 无法核实来源"

# --- 硬性规则 -------------------------------------------------
#  不管评分多少，这些规则必须遵守
hard_rules:

  min_categories: 4
  # 每封邮件至少覆盖几个不同板块
  # 可选值：3 ~ 6。设太低邮件内容单一，设太高可能某板块没新闻硬凑

  max_per_source_deep: 2
  # 同一个信息源在"深度分析"区最多出现几条
  # 防止整封邮件全是 TechCrunch 或全是 36氪

  staleness_penalty_hours: 24
  # 超过多少小时的新闻算"旧闻"
  # 超过这个时间的新闻，总分自动扣 1 分

  staleness_penalty_points: 1
  # 旧闻自动扣几分
  # 建议 1-2 分，设太大旧闻永远不会进入邮件
